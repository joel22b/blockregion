name: Create Release
run-name: "Create Release: v${{ inputs.version }}"

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (major.minor.patch)'
        required: true
        type: string
      release-notes:
        description: 'Release notes (dashed list pasted in)'
        required: true
        type: string

jobs:
  validate-release-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Commits/Branches/Tags
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify input version number matches CMakeLists.txt project version number
        run: |
          VERSION_MAJOR=$(sed -n 's/set(MAJOR "\(.*\)")/\1/p' CMakeLists.txt)
          VERSION_MINOR=$(sed -n 's/set(MINOR "\(.*\)")/\1/p' CMakeLists.txt)
          VERSION_REV=$(sed -n 's/set(REV   "\(.*\)")/\1/p' CMakeLists.txt)
          PROJECT_VERSION="${VERSION_MAJOR}.${VERSION_MINOR}.${VERSION_REV}"
          if [ "${{ inputs.version }}" != "$PROJECT_VERSION" ]; then
            echo "ERROR: Input version (${{ inputs.version }}) does not match CMakeLists.txt project version ($PROJECT_VERSION). Exiting."
            exit 1
          fi

      - name: Ensure tag for current release doesn't already exist
        run: |
          if git rev-parse "v${{ inputs.version }}" >/dev/null 2>&1; then
            echo "ERROR: tag v${{ inputs.version }} already exists. Exiting."
            exit 1
          fi

  create-packages:
    needs: validate-release-version
    strategy:
      matrix:
        include:
          - operating-system: windows-latest
            platform: Windows
            package-extension: zip
            artifact-name: windows-packages
          - operating-system: ubuntu-latest
            platform: Linux
            package-extension: deb
            artifact-name: linux-packages
    runs-on: ${{ matrix.operating-system }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install CMake
        uses: lukka/get-cmake@latest

      - name: Setup MSVC
        if: matrix.platform == 'Windows'
        uses: microsoft/setup-msbuild@v2

      - name: Add GitHub to known hosts (Linux)
        if: matrix.platform == 'Linux'
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Add GitHub to known hosts (Windows)
        if: matrix.platform == 'Windows'
        shell: pwsh
        run: |
          $sshDir = Join-Path $env:USERPROFILE ".ssh"
          if (!(Test-Path $sshDir)) { New-Item -ItemType Directory -Path $sshDir }
          ssh-keyscan -oKexAlgorithms=+diffie-hellman-group14-sha1 github.com | Out-File -FilePath (Join-Path $sshDir "known_hosts") -Encoding ascii -Append

      - name: Setup Linux
        if: matrix.platform == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libgtk-3-dev \
            pkg-config

      - name: Configure CMake (Linux)
        if: matrix.platform == 'Linux'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Configure CMake (Windows)
        if: matrix.platform == 'Windows'
        run: cmake -B build -G "Visual Studio 17 2022" -A x64

      - name: Build everything
        run: cmake --build build --config Release --parallel

      - name: Create binary packages
        working-directory: build
        run: cpack -C Release

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: build/packages/blockregion-*
          if-no-files-found: error

  upload-release-packages:
    needs: [create-packages]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Format Release Notes
        id: format-release-notes
        run: |
          FORMATTED_NOTES=$(echo "${{ inputs.release-notes }}" | sed 's/ - /\n- /g')
          echo "list<<EOF" >> $GITHUB_OUTPUT
          echo "$FORMATTED_NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Git Tag
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag -a "v${{ inputs.version }}" -m "Release v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

      - name: Create GitHub Release
        id: create-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          draft: false
          prerelease: false
          body: ${{ steps.format-release-notes.outputs.list }}
          files: |
            artifacts/windows-packages/*
            artifacts/linux-packages/*

      - name: Add Release Summary
        run: |
          echo "**Release Version:** v${{ inputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Release URL:** ${{ steps.create-release.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY